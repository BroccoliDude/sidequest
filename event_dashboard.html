<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Intelligence Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080C12;
    --bg2:       #0D1520;
    --bg3:       #121D2E;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.12);
    --gold:      #D4A017;
    --gold-l:    #F0C040;
    --gold-dim:  rgba(212,160,23,0.12);
    --green:     #22C55E;
    --green-dim: rgba(34,197,94,0.12);
    --yellow:    #EAB308;
    --yellow-dim:rgba(234,179,8,0.12);
    --red:       #EF4444;
    --red-dim:   rgba(239,68,68,0.12);
    --blue:      #3B82F6;
    --blue-dim:  rgba(59,130,246,0.10);
    --text:      #E2E8F0;
    --text-dim:  #64748B;
    --text-mid:  #94A3B8;
    --navy:      #1E3A5F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grid noise texture ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(212,160,23,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(59,130,246,0.04) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ── UPLOAD SCREEN ── */
  #upload-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; background: var(--bg);
    gap: 0;
  }

  .upload-logo {
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--gold); font-family: 'JetBrains Mono', monospace;
    margin-bottom: 48px; opacity: 0.8;
  }

  .upload-title {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 800; line-height: 1.1;
    text-align: center; margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  .upload-title span { color: var(--gold); }

  .upload-sub {
    font-size: 15px; color: var(--text-mid);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 56px; letter-spacing: 0.02em;
  }

  .drop-zone {
    width: min(600px, 90vw);
    border: 1.5px dashed var(--border2);
    border-radius: 16px;
    padding: 56px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    background: var(--bg2);
    position: relative; overflow: hidden;
  }

  .drop-zone::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, var(--gold-dim), transparent 70%);
    opacity: 0; transition: opacity 0.3s;
  }

  .drop-zone:hover::before, .drop-zone.drag-over::before { opacity: 1; }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--gold);
    transform: translateY(-2px);
  }

  .drop-icon {
    font-size: 48px; margin-bottom: 20px;
    filter: drop-shadow(0 0 20px rgba(212,160,23,0.3));
  }

  .drop-text { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .drop-hint { font-size: 13px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

  .drop-browse {
    display: inline-block; margin-top: 24px;
    padding: 10px 28px; border-radius: 8px;
    background: var(--gold); color: #000;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .drop-browse:hover { background: var(--gold-l); transform: translateY(-1px); }

  #file-input { display: none; }

  .upload-files-list {
    margin-top: 32px; width: min(600px, 90vw);
    display: flex; flex-direction: column; gap: 8px;
  }

  .uploaded-file {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 10px;
    animation: slideIn 0.3s ease;
  }

  .uploaded-file .file-icon { font-size: 20px; }
  .uploaded-file .file-name { flex: 1; font-size: 14px; font-weight: 600; }
  .uploaded-file .file-badge {
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    color: var(--green); background: var(--green-dim);
    padding: 3px 10px; border-radius: 4px;
  }

  .load-btn {
    margin-top: 24px; padding: 14px 48px;
    background: var(--gold); color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase;
    border: none; border-radius: 10px; cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .load-btn:hover { background: var(--gold-l); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(212,160,23,0.3); }
  .load-btn.visible { display: block; }

  /* ── DASHBOARD ── */
  #dashboard { position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(8,12,18,0.8); backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 50;
  }

  .header-brand {
    font-size: 13px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--gold);
    font-family: 'JetBrains Mono', monospace;
  }

  .header-tabs {
    display: flex; gap: 4px;
    background: var(--bg2); padding: 4px;
    border-radius: 10px; border: 1px solid var(--border);
  }

  .tab-btn {
    padding: 7px 16px; border-radius: 7px; border: none;
    background: transparent; color: var(--text-mid);
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .tab-btn.active {
    background: var(--gold); color: #000;
  }
  .tab-btn:hover:not(.active) { color: var(--text); background: var(--bg3); }
  .tab-btn.tab-coming-soon {
    color: var(--text-dim); opacity: 0.45;
    cursor: not-allowed; font-style: italic;
    letter-spacing: 0.08em; font-size: 11px;
  }
  .tab-btn.tab-coming-soon:hover { color: var(--text-dim); background: transparent; }

  .header-actions { display: flex; gap: 12px; align-items: center; }

  .btn-ghost {
    padding: 7px 16px; border-radius: 8px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--text-mid); font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer;
    letter-spacing: 0.05em; text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); background: var(--bg3); }

  /* ── MAIN LAYOUT ── */
  main { padding: 32px; max-width: 1600px; margin: 0 auto; }

  /* ── KPI ROW ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 16px; margin-bottom: 32px;
  }

  .kpi {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 22px;
    position: relative; overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .kpi:hover { transform: translateY(-2px); border-color: var(--border2); }

  .kpi::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-color, var(--gold)), transparent);
  }

  .kpi-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace; margin-bottom: 10px;
  }
  .kpi-value {
    font-size: 36px; font-weight: 800; line-height: 1;
    letter-spacing: -0.02em;
  }
  .kpi-sub {
    font-size: 11px; color: var(--text-dim); margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── SECTION LAYOUT ── */
  .section-grid { display: grid; gap: 20px; margin-bottom: 24px; }
  .section-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .section-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .section-grid.cols-main-side { grid-template-columns: 2fr 1fr; }
  .section-grid.cols-1 { grid-template-columns: 1fr; }

  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--border2); }

  .card-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--gold);
    font-family: 'JetBrains Mono', monospace; margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::before {
    content: ''; width: 3px; height: 14px;
    background: var(--gold); border-radius: 2px;
    display: inline-block;
  }

  /* ── TOP PICKS ── */
  .pick-item {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    gap: 16px; align-items: start;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer; border-radius: 8px;
    margin: 0 -8px; padding-left: 8px; padding-right: 8px;
  }
  .pick-item:last-child { border-bottom: none; }
  .pick-item:hover { background: var(--bg3); }

  .pick-day {
    text-align: center;
  }
  .pick-day-name {
    font-size: 18px; font-weight: 800; color: var(--gold);
    line-height: 1;
  }
  .pick-day-date {
    font-size: 10px; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace; margin-top: 4px;
  }

  .pick-name {
    font-size: 14px; font-weight: 600; line-height: 1.4;
    margin-bottom: 6px;
  }
  .pick-meta {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .pick-score-big {
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.02em;
    font-family: 'JetBrains Mono', monospace;
    text-align: right; line-height: 1;
  }

  /* ── SCORE BARS ── */
  .score-bar-row {
    margin-bottom: 14px;
  }
  .score-bar-header {
    display: flex; justify-content: space-between;
    margin-bottom: 6px;
  }
  .score-bar-label {
    font-size: 12px; color: var(--text-mid); font-weight: 600;
  }
  .score-bar-value {
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }
  .score-bar-track {
    height: 5px; background: var(--bg3);
    border-radius: 4px; overflow: hidden;
  }
  .score-bar-fill {
    height: 100%; border-radius: 4px;
    transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* ── DISTRIBUTION ── */
  .dist-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px;
  }
  .dist-label {
    font-size: 11px; font-weight: 700; width: 56px;
    font-family: 'JetBrains Mono', monospace; flex-shrink: 0;
  }
  .dist-bar-track {
    flex: 1; height: 8px; background: var(--bg3);
    border-radius: 4px; overflow: hidden;
  }
  .dist-bar-fill {
    height: 100%; border-radius: 4px;
    transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .dist-count {
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim); width: 28px; text-align: right; flex-shrink: 0;
  }
  .dist-pct {
    font-size: 11px; color: var(--text-dim); width: 36px;
    font-family: 'JetBrains Mono', monospace; flex-shrink: 0;
  }

  /* ── EVENT TABLE ── */
  .filter-bar {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
    align-items: center;
  }

  .filter-input {
    flex: 1; min-width: 200px;
    padding: 9px 14px; border-radius: 8px;
    border: 1px solid var(--border2); background: var(--bg3);
    color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  .filter-input:focus { border-color: var(--gold); }
  .filter-input::placeholder { color: var(--text-dim); }

  .filter-select {
    padding: 9px 14px; border-radius: 8px;
    border: 1px solid var(--border2); background: var(--bg3);
    color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px;
    outline: none; cursor: pointer;
  }
  .filter-select:focus { border-color: var(--gold); }

  .event-table { width: 100%; border-collapse: collapse; }
  .event-table th {
    text-align: left; padding: 10px 14px;
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
    border-bottom: 1px solid var(--border); font-weight: 600;
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  .event-table th:hover { color: var(--text); }
  .event-table th.sorted { color: var(--gold); }

  .event-table td {
    padding: 12px 14px; font-size: 13px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  .event-table tr { transition: background 0.15s; cursor: pointer; }
  .event-table tr:hover td { background: var(--bg3); }
  .event-table tr.elite td { background: rgba(212,160,23,0.05); }

  .event-name-cell {
    font-weight: 600; line-height: 1.4; max-width: 320px;
  }
  .event-organizer {
    font-size: 11px; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace; margin-top: 3px;
  }

  /* ── BADGES ── */
  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 5px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
    font-family: 'JetBrains Mono', monospace; white-space: nowrap;
  }
  .badge-elite   { background: rgba(212,160,23,0.2); color: var(--gold-l); }
  .badge-strong  { background: rgba(34,197,94,0.15); color: #4ADE80; }
  .badge-good    { background: rgba(234,179,8,0.15); color: #FDE047; }
  .badge-medium  { background: rgba(249,115,22,0.15); color: #FB923C; }
  .badge-skip    { background: rgba(239,68,68,0.15); color: #F87171; }
  .badge-cat     { background: var(--bg3); color: var(--text-mid); border: 1px solid var(--border); }
  .badge-ticket  { background: var(--blue-dim); color: #60A5FA; }
  .badge-ticket.invite { background: rgba(168,85,247,0.15); color: #C084FC; }
  .badge-ticket.waitlist { background: rgba(249,115,22,0.15); color: #FB923C; }
  .badge-ticket.closed { background: var(--red-dim); color: #F87171; }
  .badge-ticket.open { background: var(--green-dim); color: #4ADE80; }

  /* ── SCORE DISPLAY ── */
  .score-num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 15px;
  }
  .score-mini-bars {
    display: flex; gap: 2px; margin-top: 4px;
  }
  .score-mini-bar {
    width: 3px; border-radius: 2px;
    transition: height 0.5s ease;
  }

  /* ── CATEGORY CHART ── */
  .cat-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px; cursor: pointer;
    transition: opacity 0.2s;
  }
  .cat-row:hover { opacity: 0.8; }
  .cat-name {
    font-size: 12px; font-weight: 600; width: 160px;
    flex-shrink: 0; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis;
  }
  .cat-bar-wrap { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .cat-bar { height: 100%; border-radius: 3px; background: var(--gold); }
  .cat-avg { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-mid); width: 36px; text-align: right; }
  .cat-count { font-size: 11px; color: var(--text-dim); width: 24px; text-align: right; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px); z-index: 200;
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 20px; width: min(700px, 100%);
    max-height: 90vh; overflow-y: auto;
    animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .modal-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: start; gap: 16px;
  }
  .modal-title { font-size: 18px; font-weight: 700; line-height: 1.4; flex: 1; }
  .modal-close {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text-dim); width: 32px; height: 32px;
    border-radius: 8px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .modal-close:hover { color: var(--text); border-color: var(--border2); }

  .modal-body { padding: 24px 28px; }

  .modal-score-row {
    display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
  }

  .modal-dim {
    flex: 1; min-width: 80px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; text-align: center;
  }
  .modal-dim-label {
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
    margin-bottom: 6px;
  }
  .modal-dim-val {
    font-size: 22px; font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .modal-section { margin-bottom: 20px; }
  .modal-section-label {
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--gold); font-family: 'JetBrains Mono', monospace;
    margin-bottom: 8px; font-weight: 700;
  }
  .modal-section-body {
    font-size: 14px; line-height: 1.7; color: var(--text-mid);
  }
  .modal-flags {
    background: var(--red-dim); border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px; padding: 12px 16px;
    font-size: 13px; line-height: 1.6; color: #FCA5A5;
  }
  .modal-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--gold); text-decoration: none; font-size: 13px;
    font-weight: 600; margin-top: 8px;
    transition: opacity 0.2s;
  }
  .modal-link:hover { opacity: 0.7; }

  /* ── ANIMATIONS ── */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .animate-in { animation: fadeUp 0.5s ease both; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* ── PAGINATION ── */
  .pagination {
    display: flex; gap: 6px; justify-content: center;
    margin-top: 20px; padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .page-btn {
    padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .page-btn:hover, .page-btn.active {
    background: var(--gold); color: #000; border-color: var(--gold);
  }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── RESPONSIVE ── */
  @media (max-width: 1100px) {
    .kpi-row { grid-template-columns: repeat(3, 1fr); }
    .section-grid.cols-3 { grid-template-columns: 1fr 1fr; }
    .section-grid.cols-main-side { grid-template-columns: 1fr; }
  }
  @media (max-width: 700px) {
    main { padding: 16px; }
    header { padding: 12px 16px; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .section-grid.cols-3, .section-grid.cols-2 { grid-template-columns: 1fr; }
    .header-tabs { display: none; }
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  .no-results { text-align: center; padding: 40px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  .sort-icon { font-size: 9px; margin-left: 4px; }

  /* ── DAY TABS ── */
  .day-tabs-bar {
    display: flex; gap: 4px; margin-bottom: 20px;

</style>

<body>

<!-- DASHBOARD -->
<div id="dashboard" style="display:block">
  <header>
    <div class="header-brand">⬡ Event Intelligence</div>
    <div class="header-tabs" id="sheet-tabs"></div>
    <div class="header-actions"></div>
  </header>

  <main>
    <!-- KPIs -->
    <div class="kpi-row" id="kpi-row"></div>

    <!-- Row 1: Top Picks + Distribution + Category -->
    <div class="section-grid cols-3" style="margin-bottom:20px">
      <div class="card" id="top-picks-card">
        <div class="card-title">Daily Top Picks</div>
        <div id="top-picks-list"></div>
      </div>
      <div class="card">
        <div class="card-title">Score Distribution</div>
        <div id="dist-chart"></div>
      </div>
      <div class="card">
        <div class="card-title">Category Performance</div>
        <div id="cat-chart"></div>
      </div>
    </div>

    <!-- Row 2: Full Event Table -->
    <div class="card">
      <div class="card-title">All Events</div>
      <div class="day-tabs-bar" id="day-tabs-bar"></div>
      <div class="filter-bar">
        <input class="filter-input" id="search-input" placeholder="Search events, organizers..." oninput="filterEvents()">
        <select class="filter-select" id="cat-filter" onchange="filterEvents()">
          <option value="">All Categories</option>
        </select>
        <select class="filter-select" id="ticket-filter" onchange="filterEvents()">
          <option value="">All Access Types</option>
          <option value="curated">Curated</option>
          <option value="invite_only">Invite Only</option>
          <option value="waitlist">Waitlist</option>
          <option value="open">Open</option>
          <option value="closed">Closed</option>
        </select>
        <select class="filter-select" id="band-filter" onchange="filterEvents()">
          <option value="">All Scores</option>
          <option value="elite">Elite (9+)</option>
          <option value="strong">Strong (8-9)</option>
          <option value="good">Good (7-8)</option>
          <option value="medium">Medium (5.5-7)</option>
          <option value="skip">Skip (&lt;5.5)</option>
        </select>
        <select class="filter-select" id="day-filter" onchange="filterEvents()">
          <option value="">All Days</option>
        </select>
      </div>

      <div style="overflow-x:auto">
        <table class="event-table" id="event-table">
          <thead>
            <tr>
              <th onclick="sortBy('day_rank')">#<span class="sort-icon" id="sort-day_rank"></span></th>
              <th onclick="sortBy('event_name')">Event<span class="sort-icon" id="sort-event_name"></span></th>
              <th onclick="sortBy('score_total')">Score<span class="sort-icon" id="sort-score_total">↓</span></th>
              <th onclick="sortBy('category')">Category<span class="sort-icon" id="sort-category"></span></th>
              <th onclick="sortBy('date')">Date<span class="sort-icon" id="sort-date"></span></th>
              <th>Access</th>
              <th onclick="sortBy('score_room')">Room<span class="sort-icon" id="sort-score_room"></span></th>
              <th onclick="sortBy('score_size')">Size<span class="sort-icon" id="sort-score_size"></span></th>
            </tr>
          </thead>
          <tbody id="event-tbody"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

// ── State ──────────────────────────────────────────────────────────────────────
let allSheets = EMBEDDED_DATA;
let currentSheet = '';
let currentData  = [];
let filteredData = [];
let sortCol      = 'score_total';
let sortDir      = -1;  // -1=desc, 1=asc
let page         = 1;
const PAGE_SIZE  = 25;
let activeDayTab = '';  // '' means All Days

// ── Tabs ───────────────────────────────────────────────────────────────────────
function buildTabs() {
  const tabs = document.getElementById('sheet-tabs');
  tabs.innerHTML = '';
  Object.keys(allSheets).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn'; btn.textContent = name;
    btn.onclick = () => switchSheet(name);
    tabs.appendChild(btn);
  });
  // Coming Soon tab (not clickable)
  const soon = document.createElement('button');
  soon.className = 'tab-btn tab-coming-soon';
  soon.textContent = 'COMING SOON';
  soon.disabled = true;
  tabs.appendChild(soon);
}

function switchSheet(name) {
  currentSheet = name;
  currentData  = allSheets[name] || [];
  activeDayTab = '';  // Reset day tab on sheet switch
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent === name));
  buildFilters();
  filterEvents();
  renderKPIs();
  renderTopPicks();
  renderDistribution();
  renderCategories();
}

// ── KPIs ───────────────────────────────────────────────────────────────────────
function renderKPIs() {
  const d = currentData;
  const total  = d.length;
  const elite  = d.filter(r => r.score_total >= 9).length;
  const strong = d.filter(r => r.score_total >= 8 && r.score_total < 9).length;
  const avg    = (d.reduce((s,r) => s + r.score_total, 0) / total).toFixed(2);
  const curated= d.filter(r => ['curated','invite_only'].includes(r.ticket_type)).length;
  const waitl  = d.filter(r => r.ticket_type === 'waitlist').length;

  const kpis = [
    { label: 'Events', value: total, sub: 'total analyzed', color: 'var(--blue)' },
    { label: 'Elite', value: elite, sub: '≥ 9.0 score', color: 'var(--gold)' },
    { label: 'Strong', value: strong, sub: '8 – 9 score', color: 'var(--green)' },
    { label: 'Avg Score', value: avg, sub: 'across all events', color: 'var(--blue)' },
    { label: 'Curated', value: curated, sub: 'curated / invite', color: '#A78BFA' },
    { label: 'Waitlist', value: waitl, sub: 'need monitoring', color: 'var(--yellow)' },
  ];

  document.getElementById('kpi-row').innerHTML = kpis.map((k,i) => `
    <div class="kpi animate-in" style="--accent-color:${k.color}; animation-delay:${i*60}ms">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value" style="color:${k.color}">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('');
}

// ── Top Picks ──────────────────────────────────────────────────────────────────
function renderTopPicks() {
  const tops = currentData.filter(r => r.day_rank == 1).sort((a,b) => {
    // Sort by date string
    return new Date(a.date) - new Date(b.date);
  });

  document.getElementById('top-picks-list').innerHTML = tops.map(r => {
    const sc = r.score_total;
    const col = sc >= 9 ? 'var(--gold-l)' : sc >= 8 ? 'var(--green)' : sc >= 7 ? 'var(--yellow)' : 'var(--red)';
    return `
    <div class="pick-item" onclick="openModal(${currentData.indexOf(r)})">
      <div class="pick-day">
        <div class="pick-day-name">${r.day_of_week || ''}</div>
        <div class="pick-day-date">${(r.date||'').replace(', 2026','').replace(', 2025','')}</div>
      </div>
      <div>
        <div class="pick-name">${r.event_name}</div>
        <div class="pick-meta">
          ${r.category ? `<span class="badge badge-cat">${r.category}</span>` : ''}
          ${ticketBadge(r.ticket_type)}
        </div>
      </div>
      <div>
        <div class="pick-score-big" style="color:${col}">${sc.toFixed(2)}</div>
        <div style="font-size:10px;color:var(--text-dim);text-align:right;font-family:'JetBrains Mono',monospace;margin-top:4px">${r.time||''}</div>
      </div>
    </div>`;
  }).join('') || '<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">No top picks found</div></div>';
}

// ── Distribution ───────────────────────────────────────────────────────────────
function renderDistribution() {
  const d = currentData, n = d.length;
  const bands = [
    { label: 'Elite', min:9,   max:11, color:'var(--gold)',  dim:'var(--gold-dim)' },
    { label: 'Strong',min:8,   max:9,  color:'var(--green)', dim:'var(--green-dim)' },
    { label: 'Good',  min:7,   max:8,  color:'var(--yellow)',dim:'var(--yellow-dim)' },
    { label: 'Medium',min:5.5, max:7,  color:'#FB923C',      dim:'rgba(249,115,22,0.12)' },
    { label: 'Skip',  min:0,   max:5.5,color:'var(--red)',   dim:'var(--red-dim)' },
  ];
  document.getElementById('dist-chart').innerHTML = bands.map(b => {
    const count = d.filter(r => r.score_total >= b.min && r.score_total < b.max).length;
    const pct   = n ? count/n*100 : 0;
    return `
    <div class="dist-row">
      <div class="dist-label" style="color:${b.color}">${b.label}</div>
      <div class="dist-bar-track">
        <div class="dist-bar-fill" style="width:${pct}%;background:${b.color}"></div>
      </div>
      <div class="dist-count">${count}</div>
      <div class="dist-pct">${pct.toFixed(0)}%</div>
    </div>`;
  }).join('');
}

// ── Category Chart ─────────────────────────────────────────────────────────────
function renderCategories() {
  const d = currentData;
  const cats = {};
  d.forEach(r => {
    if (!r.category) return;
    if (!cats[r.category]) cats[r.category] = { total:0, count:0 };
    cats[r.category].total += r.score_total;
    cats[r.category].count++;
  });
  const sorted = Object.entries(cats)
    .map(([k,v]) => ({ name:k, avg: v.total/v.count, count: v.count }))
    .sort((a,b) => b.avg - a.avg);

  const maxAvg = sorted[0]?.avg || 10;
  document.getElementById('cat-chart').innerHTML = sorted.map(c => `
    <div class="cat-row" onclick="filterByCategory('${c.name}')">
      <div class="cat-name" title="${c.name}">${c.name}</div>
      <div class="cat-bar-wrap">
        <div class="cat-bar" style="width:${(c.avg/maxAvg)*100}%"></div>
      </div>
      <div class="cat-avg">${c.avg.toFixed(1)}</div>
      <div class="cat-count">${c.count}</div>
    </div>`).join('');
}

function filterByCategory(cat) {
  document.getElementById('cat-filter').value = cat;
  filterEvents();
  document.getElementById('event-table').scrollIntoView({ behavior:'smooth', block:'start' });
}

// ── Filters & Table ────────────────────────────────────────────────────────────
function buildFilters() {
  // Categories
  const cats = [...new Set(currentData.map(r => r.category).filter(Boolean))].sort();
  const catSel = document.getElementById('cat-filter');
  catSel.innerHTML = '<option value="">All Categories</option>' +
    cats.map(c => `<option value="${c}">${c}</option>`).join('');

  // Days
  const days = [...new Set(currentData.map(r => r.date).filter(Boolean))].sort((a,b)=>new Date(a)-new Date(b));
  const daySel = document.getElementById('day-filter');
  daySel.innerHTML = '<option value="">All Days</option>' +
    days.map(d => `<option value="${d}">${d}</option>`).join('');

  // Build day tabs
  buildDayTabs();
}

function buildDayTabs() {
  const dayOrder = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const dayFull  = { Mon:'Monday', Tue:'Tuesday', Wed:'Wednesday', Thu:'Thursday', Fri:'Friday', Sat:'Saturday', Sun:'Sunday' };

  // Count events per day_of_week
  const dayCounts = {};
  currentData.forEach(r => {
    const d = (r.day_of_week || '').substring(0,3);
    if (d) dayCounts[d] = (dayCounts[d] || 0) + 1;
  });

  const activeDays = dayOrder.filter(d => dayCounts[d]);
  const bar = document.getElementById('day-tabs-bar');

  let html = `<button class="day-tab-btn${activeDayTab === '' ? ' active' : ''}" onclick="switchDayTab('')">All Days<span class="day-tab-count">${currentData.length}</span></button>`;

  activeDays.forEach(d => {
    html += `<button class="day-tab-btn${activeDayTab === d ? ' active' : ''}" onclick="switchDayTab('${d}')">${dayFull[d]}<span class="day-tab-count">${dayCounts[d]}</span></button>`;
  });

  bar.innerHTML = html;
}

function switchDayTab(day) {
  activeDayTab = day;
  // Update tab active states
  document.querySelectorAll('.day-tab-btn').forEach(btn => {
    const btnDay = btn.onclick.toString().match(/switchDayTab\('(.*)'\)/);
    if (btnDay) btn.classList.toggle('active', btnDay[1] === day);
  });
  // Clear the day dropdown filter to avoid conflicts
  document.getElementById('day-filter').value = '';
  filterEvents();
}

function filterEvents() {
  const q    = document.getElementById('search-input').value.toLowerCase();
  const cat  = document.getElementById('cat-filter').value;
  const tick = document.getElementById('ticket-filter').value;
  const band = document.getElementById('band-filter').value;
  const day  = document.getElementById('day-filter').value;

  filteredData = currentData.filter(r => {
    if (q && !r.event_name.toLowerCase().includes(q) &&
             !r.organizer.toLowerCase().includes(q) &&
             !(r.category||'').toLowerCase().includes(q)) return false;
    if (cat  && r.category    !== cat)  return false;
    if (tick && r.ticket_type !== tick) return false;
    if (day  && r.date        !== day)  return false;
    // Day tab filter (by day_of_week)
    if (activeDayTab && !(r.day_of_week||'').startsWith(activeDayTab)) return false;
    if (band) {
      const s = r.score_total;
      if (band === 'elite'  && s < 9)          return false;
      if (band === 'strong' && (s < 8 || s >= 9)) return false;
      if (band === 'good'   && (s < 7 || s >= 8)) return false;
      if (band === 'medium' && (s < 5.5|| s >= 7)) return false;
      if (band === 'skip'   && s >= 5.5)       return false;
    }
    return true;
  });

  // Apply sort
  filteredData.sort((a,b) => {
    const av = a[sortCol], bv = b[sortCol];
    if (typeof av === 'number') return (av - bv) * sortDir;
    return (String(av||'').localeCompare(String(bv||''))) * sortDir;
  });

  page = 1;
  renderTable();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = -1; }
  document.querySelectorAll('.sort-icon').forEach(el => el.textContent = '');
  const icon = document.getElementById('sort-' + col);
  if (icon) icon.textContent = sortDir === -1 ? '↓' : '↑';
  filterEvents();
}

function renderTable() {
  const start = (page-1)*PAGE_SIZE, end = start + PAGE_SIZE;
  const slice = filteredData.slice(start, end);

  document.getElementById('event-tbody').innerHTML = slice.length ? slice.map(r => {
    const idx  = currentData.indexOf(r);
    const sc   = r.score_total;
    const col  = sc >= 9 ? 'var(--gold-l)' : sc >= 8 ? '#4ADE80' : sc >= 7 ? '#FDE047' : sc >= 5.5 ? '#FB923C' : '#F87171';
    const band = sc >= 9 ? 'elite' : sc >= 8 ? 'strong' : sc >= 7 ? 'good' : sc >= 5.5 ? 'medium' : 'skip';
    const isTop = r.day_rank == 1;
    return `
    <tr class="${isTop ? 'elite' : ''}" onclick="openModal(${idx})">
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${isTop?'var(--gold)':'var(--text-dim)'}">
        ${isTop ? '★' : '#'+r.day_rank}
      </td>
      <td>
        <div class="event-name-cell">${r.event_name}</div>
        <div class="event-organizer">${r.organizer || ''}</div>
      </td>
      <td>
        <span class="score-num" style="color:${col}">${sc.toFixed(2)}</span>
        <div style="margin-top:4px">
          <span class="badge badge-${band}">${band.toUpperCase()}</span>
        </div>
      </td>
      <td><span class="badge badge-cat">${r.category||''}</span></td>
      <td style="font-size:12px;font-family:'JetBrains Mono',monospace;white-space:nowrap">
        ${r.date||''}<br><span style="color:var(--text-dim)">${r.time||''}</span>
      </td>
      <td>${ticketBadge(r.ticket_type)}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:13px">${r.score_room||'—'}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:13px">${r.score_size||'—'}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="8" class="no-results">No events match your filters</td></tr>`;

  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filteredData.length / PAGE_SIZE);
  if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= total; i++) {
    if (i === 1 || i === total || Math.abs(i-page) <= 2) {
      html += `<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i-page) === 3) {
      html += `<span style="color:var(--text-dim);padding:6px 4px">…</span>`;
    }
  }
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) { page = p; renderTable(); }

// ── Modal ──────────────────────────────────────────────────────────────────────
function openModal(idx) {
  const r = currentData[idx];
  if (!r) return;
  const sc  = r.score_total;
  const col = sc >= 9 ? 'var(--gold-l)' : sc >= 8 ? '#4ADE80' : sc >= 7 ? '#FDE047' : sc >= 5.5 ? '#FB923C' : '#F87171';

  document.getElementById('modal-title').innerHTML = `
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
      <span style="font-size:28px;font-weight:800;color:${col};font-family:'JetBrains Mono',monospace">${sc.toFixed(2)}</span>
      ${r.day_rank==1 ? '<span class="badge badge-elite">★ TOP PICK</span>' : ''}
      ${r.category ? `<span class="badge badge-cat">${r.category}</span>` : ''}
      ${ticketBadge(r.ticket_type)}
    </div>
    ${r.event_name}`;

  const dims = [
    { label:'Relevance', val:r.score_relevance },
    { label:'Room',      val:r.score_room },
    { label:'Size',      val:r.score_size },
    { label:'Logistics', val:r.score_logistics },
    { label:'Novelty',   val:r.score_novelty },
  ];
  const dimColor = v => v >= 8 ? '#4ADE80' : v >= 6 ? '#FDE047' : '#F87171';

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-score-row">
      ${dims.map(d => `
      <div class="modal-dim">
        <div class="modal-dim-label">${d.label}</div>
        <div class="modal-dim-val" style="color:${dimColor(d.val)}">${d.val||'—'}</div>
      </div>`).join('')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px">
        <div style="font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">Details</div>
        <div style="font-size:12px;color:var(--text-mid);line-height:2">
          📅 ${r.date||'—'} (${r.day_of_week||''})<br>
          ⏰ ${r.time||'—'} – ${r.end_time||'—'}<br>
          📍 ${r.location||'—'}<br>
          👥 ${r.attendee_count > 0 ? r.attendee_count + ' attendees' : 'Unknown size'}
        </div>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px">
        <div style="font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">Organizer</div>
        <div style="font-size:13px;color:var(--text);line-height:1.6">${r.organizer||'—'}</div>
        ${r.status ? `<div style="font-size:11px;color:var(--text-dim);margin-top:8px;font-family:'JetBrains Mono',monospace">${r.status}</div>` : ''}
      </div>
    </div>

    ${r.why_attend ? `
    <div class="modal-section">
      <div class="modal-section-label">Why Attend</div>
      <div class="modal-section-body">${r.why_attend}</div>
    </div>` : ''}

    ${r.red_flags ? `
    <div class="modal-section">
      <div class="modal-section-label">Red Flags</div>
      <div class="modal-flags">${r.red_flags}</div>
    </div>` : ''}

    ${r.link ? `
    <a href="${r.link}" target="_blank" class="modal-link">
      Open on Lu.ma →
    </a>` : ''}
  `;

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── Helpers ────────────────────────────────────────────────────────────────────
function ticketBadge(type) {
  const map = {
    invite_only: ['invite','invite'],
    curated:     ['curated',''],
    waitlist:    ['waitlist','waitlist'],
    closed:      ['closed','closed'],
    open:        ['open','open'],
    free_open:   ['free','open'],
    paid:        ['paid',''],
  };
  const [label, cls] = map[type] || [type||'', ''];
  return label ? `<span class="badge badge-ticket ${cls}">${label}</span>` : '';
}

function scoreColor(s) {
  if (s >= 9) return 'var(--gold-l)';
  if (s >= 8) return 'var(--green)';
  if (s >= 7) return 'var(--yellow)';
  if (s >= 5.5) return '#FB923C';
  return 'var(--red)';
}

// ── Auto-init ─────────────────────────────────────────────────────────────────
buildTabs();
switchSheet(Object.keys(allSheets)[0]);
</script>
</body>
